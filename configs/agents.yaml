# Agent and skill configuration.
#
# Skills are declared per agent under `skills:` and toggled with `enabled`.
# All skills ship disabled: the deterministic dry workflow is the permanent
# baseline, and enabling a skill must never be required for the pipeline to
# run. Disabled entries may name skills that are not implemented yet.
#
# The top-level `llm:` section configures the shared LLM client seam.
# `provider: none` keeps runs free of network and API-key dependencies;
# `stub` replays recorded fixtures; `anthropic` calls the live API.

llm:
  provider: none
  model: claude-opus-4-8
  max_tokens: 4096
  fixtures: tests/fixtures/llm_fixtures.json
  cost_cap_usd: 2.0

agents:
  quant_scout:
    role: Paper discovery and relevance ranking
    default_keywords:
      - asset pricing
      - portfolio
      - market microstructure
      - forecasting
      - risk
      - machine learning
    charter:
      purpose: >-
        Reproducible cross-sectional equity return predictability with
        out-of-sample, net-of-cost evaluation.
      themes:
        - momentum
        - value
        - cross-section
        - machine learning
        - factor
      must_have:
        - returns
      exclude:
        - pure theory
    skills:
      arxiv_search:
        enabled: false
      charter_relevance:
        enabled: false
        relevance_boost: 10.0
      reproducibility_triage:
        enabled: false
        threshold: 0.5
  quant_reader:
    role: PaperQA2-backed paper summarization and method extraction
    rag_backbone: PaperQA2
    fallback: metadata extraction
    extraction_fields:
      - research_question
      - proposed_method
      - assumptions
      - datasets
      - metrics
      - limitations
    skills:
      pdf_acquisition:
        enabled: false
        cache_dir: data/raw
      target_table_extraction:
        enabled: false
        default_tolerance: 0.2
      method_spec_extraction:
        enabled: false
      red_flag_scan:
        enabled: false
  quant_coder:
    role: ERA-backed reproducible implementation planning
    search_algorithm: Flat UCB Tree Search
    deterministic_adapter: true
    output_sections:
      - modules
      - assumptions
      - tests
      - open_questions
    skills:
      code_generation:
        enabled: false
        iterations: 3
        adapter: complete   # complete | agent (headless Claude Code; falls back when unavailable)
  quant_bench:
    role: Benchmark evaluation and robustness checks
    default_metrics:
      - mean_return
      - volatility
      - sharpe
      - max_drawdown
    skills:
      dataset_registry:
        enabled: false
        dataset: planted_momentum   # planted_momentum | pure_noise | french_momentum | crsp
        params: {}
      walk_forward:
        enabled: false
        train_periods: 36
        test_periods: 12
        embargo: 1
        cost_bps: 10.0
        # Optional FF5+momentum factors CSV (YYYYMM + factor columns, percent)
        # for the spanning regression; spanning is skipped when unset/absent.
        factors_path: ""
  quant_reviewer:
    role: Research synthesis and final review
    verdicts:
      - promising
      - inconclusive
      - weak
    skills:
      rubric_verdict:
        enabled: false
