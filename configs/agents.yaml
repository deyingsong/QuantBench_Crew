# Agent and skill configuration.
#
# Skills are declared per agent under `skills:` and toggled with `enabled`.
# All skills ship disabled: the deterministic dry workflow is the permanent
# baseline, and enabling a skill must never be required for the pipeline to
# run. Disabled entries may name skills that are not implemented yet.
#
# The top-level `llm:` section configures the shared LLM client seam.
# `provider: none` keeps runs free of network and API-key dependencies;
# `stub` replays recorded fixtures; `anthropic` calls the live API.

# provider: none | stub | per-agent | openai | gemini | anthropic | grok | deepseek
#
# `per-agent` (the default) gives each agent its own backbone, matched to the
# agent's job (see `agents:` below). Each backbone reads its API key from the
# provider's environment variable "port" (override with `api_key_env`, point
# at a proxy with `base_url`):
#   openai -> OPENAI_API_KEY        gemini   -> GEMINI_API_KEY (or GOOGLE_API_KEY)
#   grok   -> XAI_API_KEY           deepseek -> DEEPSEEK_API_KEY
#   anthropic -> ANTHROPIC_API_KEY (or ANTHROPIC_AUTH_TOKEN; needs `pip install anthropic`)
#
# Fallback: a backbone whose key/SDK is missing — or whose live call errors —
# downgrades THAT AGENT ALONE to its deterministic offline fallback, with the
# reason recorded in the run manifest. With no keys at all this config
# degrades to the fully offline dry workflow.
#
# Agent Skills (skills/<name>/SKILL.md, open SKILL.md standard) ride on every
# call two ways, per agent:
#   mode: api      (route 2, default) single-shot API call with the agent's
#                  skill body injected into the system prompt
#   mode: harness  (route 1, opt-in)  drive a skill-supporting agent-host CLI
#                  instead — headless Claude Code by default; point
#                  harness_command at codex/gemini/any standard host
# Set `skills_dir: ""` to disable skill injection entirely.
llm:
  provider: per-agent
  model: claude-opus-4-8          # default for single-provider modes
  max_tokens: 4096
  fixtures: tests/fixtures/llm_fixtures.json   # stub provider only
  cost_cap_usd: 2.0
  skills_dir: skills              # Agent Skills root ("" disables injection)
  agents:
    quant_scout:                  # discovery/triage of fresh papers: Grok's
      provider: grok              # real-time orientation; cheap bulk scoring
      model: grok-4
    quant_reader:                 # long-document method/claim extraction:
      provider: gemini            # Gemini's long context + doc understanding
      model: gemini-2.5-pro
    quant_coder:                  # strategy code generation: Claude's coding
      provider: anthropic         # strength; synergy with headless Claude Code
      model: claude-opus-4-8
      # Route 1 port — flip mode to drive an agent-host CLI anytime:
      # mode: harness
      # harness_command: ["claude", "-p", "{prompt}", "--model", "{model}"]
      # harness_timeout: 300
    quant_bench:                  # numeric/statistical interpretation:
      provider: deepseek          # DeepSeek's math reasoning at low cost
      model: deepseek-chat
    quant_reviewer:               # final synthesis and red-team critique:
      provider: openai            # GPT's balanced general reasoning
      model: gpt-5

agents:
  quant_scout:
    role: Paper discovery and relevance ranking
    assigned_sources:
      - arxiv
      - journals
    default_keywords:
      - asset pricing
      - portfolio
      - market microstructure
      - forecasting
      - risk
      - machine learning
    charter:
      purpose: >-
        Reproducible cross-sectional equity return predictability with
        out-of-sample, net-of-cost evaluation.
      themes:
        - momentum
        - value
        - cross-section
        - machine learning
        - factor
      must_have:
        - returns
      exclude:
        - pure theory
    skills:
      arxiv_search:
        enabled: false
      charter_relevance:
        enabled: false
        relevance_boost: 10.0
      relevance_scorer:
        enabled: false
        relevance_boost: 10.0
      reproducibility_triage:
        enabled: false
        threshold: 0.5
  quant_reader:
    role: PaperQA2-backed paper summarization and method extraction
    rag_backbone: PaperQA2
    fallback: metadata extraction
    extraction_fields:
      - research_question
      - field_state
      - importance
      - existing_method_gap
      - claimed_contribution
      - proposed_method
      - equations
      - algorithms
      - experiment_settings
      - assumptions
      - datasets
      - features
      - labels
      - preprocessing
      - splits
      - baselines
      - metrics
      - limitations
      - validity_threats
      - future_directions
    skills:
      pdf_acquisition:
        enabled: false
        cache_dir: data/raw
      question_identifier:
        enabled: false
      methodology_extractor:
        enabled: false
      empirical_spec_parser:
        enabled: false
      criticizer:
        enabled: false
      target_table_extraction:
        enabled: false
        default_tolerance: 0.2
      method_spec_extraction:
        enabled: false
      red_flag_scan:
        enabled: false
  quant_coder:
    role: ERA-backed reproducible implementation planning
    search_algorithm: Flat UCB Tree Search
    deterministic_adapter: true
    output_sections:
      - modules
      - assumptions
      - tests
      - open_questions
    skills:
      code_generation:
        enabled: true       # on by default: reports ship <slug>_strategy.py;
                            # the deterministic reference-template fallback
                            # keeps this offline-safe with no LLM keys
        iterations: 3
        adapter: complete   # complete | agent (headless Claude Code; falls back when unavailable)
      metric_synthesis:
        enabled: true       # code paper-claimed metrics the suite lacks;
                            # offline-safe (skips with a note when no LLM)
        max_metrics: 3
  quant_bench:
    role: Benchmark evaluation and robustness checks
    default_metrics:
      - mean_return
      - volatility
      - sharpe
      - max_drawdown
    skills:
      dataset_registry:
        enabled: false
        dataset: planted_momentum   # planted_momentum | pure_noise | french_momentum | crsp
        params: {}
      walk_forward:
        enabled: false
        train_periods: 36
        test_periods: 12
        embargo: 1
        cost_bps: 10.0
        # Optional FF5+momentum factors CSV (YYYYMM + factor columns, percent)
        # for the spanning regression; spanning is skipped when unset/absent.
        factors_path: ""
      strategy_evaluator:
        enabled: false
        primary_expect_edge: true
        datasets:
          - experiment: planted-alternate-seed
            name: planted_momentum
            params:
              seed: 1
            expect_edge: true
          - experiment: pure-noise-null
            name: pure_noise
            params:
              seed: 0
            expect_edge: false
      robustness_auditor:
        enabled: false
        cost_bps_scenarios:
          - 10.0
          - 25.0
          - 50.0
        max_parameter_sharpe_spread: 1.5
        max_deflated_sharpe_p_value: 0.1
  quant_reviewer:
    role: Research synthesis and final review
    verdicts:
      - promising
      - inconclusive
      - weak
    skills:
      rubric_verdict:
        enabled: false
      claims_vs_results_analyzer:
        enabled: false
      report_compiler:
        enabled: false
